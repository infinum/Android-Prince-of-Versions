plugins {
    alias(libs.plugins.android.library)
}

apply from: './quality.gradle'

ext.mavenPublishProperties = [
        group      : "co.infinum",
        version    : libs.versions.prince.get(),
        artifact   : "prince-of-versions",
        repository : [
                url     : sonatype.url,
                username: sonatype.username,
                password: sonatype.password
        ],
        name       : "Prince of Versions",
        description: "Library that checks for updates using configuration from remote or local resources",
        url        : "https://github.com/infinum/Android-Prince-of-Versions",
        scm        : [
                connection: "https://github.com/infinum/Android-Prince-of-Versions.git",
                url       : "https://github.com/infinum/Android-Prince-of-Versions"
        ]
]

android {
    compileSdkVersion libs.versions.compileSdk.get().toInteger()

    defaultConfig {
        minSdkVersion libs.versions.minSdk.get().toInteger()
        targetSdkVersion libs.versions.targetSdk.get().toInteger()
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    resourcePrefix 'prince_of_versions_'
    namespace 'co.infinum.princeofversions'

    // Configure Java toolchain to use Java 21
    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }

    publishing {
        singleVariant("release") {
            withSourcesJar()
            withJavadocJar()
        }
    }
}

version = ext.mavenPublishProperties.version
group = ext.mavenPublishProperties.group

dependencies {
    compileOnly libs.androidx.annotation
    compileOnly libs.spotbugs.annotations

    testImplementation libs.junit
    testImplementation libs.mockito.core
    testImplementation libs.okhttp.mockwebserver
    testImplementation libs.assertj.core
    testImplementation libs.json
    testCompileOnly libs.spotbugs.annotations
}

apply from: '../tasks.gradle'
apply from: '../maven-publish.gradle'

preBuild.dependsOn ':prince-of-versions:generateReadme'

